{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arizonia&display=swap" rel="stylesheet">  
    <script src="https://kit.fontawesome.com/d495971c43.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="add-record-bar">
        <form class="record-search-form" action="{% url 'record_search' %}" method="get" role="search">
            <label class="sr-only" for="record-search">Search all records</label>
            <input id="record-search" name="q" type="search" value="{{ request.GET.q }}" placeholder="Search all records..." required>
            <button type="submit" aria-label="Search">
                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            </button>
        </form>
        <div class="add-record-menu">
            <button class="add-record-button" type="button" aria-expanded="false" aria-controls="add-record-dropdown">
                <i class="fa-solid fa-plus" aria-hidden="true"></i>
                <span>Add record</span>
                <i class="fa-solid fa-chevron-down add-record-chevron" aria-hidden="true"></i>
            </button>
            <ul class="add-record-dropdown" id="add-record-dropdown" hidden>
                <li><a href="{% url 'article_create' %}">Add Article</a></li>
                <li><a href="{% url 'journal_create' %}">Add Journal Entry</a></li>
                <li><a href="{% url 'note_create' %}">Add Note</a></li>
                <li><a href="{% url 'centralpoint_create' %}">Add Central Point</a></li>
                <li><a href="{% url 'strategy_create' %}">Add Strategy</a></li>
                <li><a href="{% url 'decision_create' %}">Add Decision</a></li>
                <li><a href="{% url 'goal_create' %}">Add Goal</a></li>
            </ul>
        </div>
    </div>

    <header class="header">
        <nav class="header-nav">
            <div class="logo">
                <img class="logo-icon" src="{% static 'imgs/papyrus.png' %}" alt="">
                <p>Costas Nicou - BackOffice</p>
            </div>

            <input class="menu-toggle" type="checkbox" id="menu-toggle">
            <label class="hamburger" for="menu-toggle">
                <span class="sr-only">Toggle navigation menu</span>
                <span></span>
                <span></span>
                <span></span>
            </label>

            <button class="sidebar-toggle" type="button" aria-expanded="false" aria-label="Toggle categories and tags">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <div class="menu-wraper">
                <ul class="header-menu">
                    <li><a href="{% url 'index' %}">Articles</a></li>
                    <li><a href="{% url 'journal_index' %}">Journal</a></li>
                    <li><a href="{% url 'note_index' %}">Notes</a></li>
                    <li><a href="{% url 'centralpoint_index' %}">Central Points</a></li>
                    <li><a href="{% url 'strategy_index' %}">Strategies</a></li>
                    <li><a href="{% url 'decision_index' %}">Decisions</a></li>
                    <li><a href="{% url 'goal_index' %}">Goals</a></li>
                </ul>
            </div>

            <div class="logout">
                <a href="{% url 'logout' %}" aria-label="Log out"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
            </div>
        </nav>

    </header>

    <main class="main">
        {% block main %}


        {% endblock %}

    </main>


    <footer class="footer">

    </footer>

    <script src="{% static 'js/mobile-navigation.js' %}" defer></script>
    <script src="{% static 'js/add-record-menu.js' %}" defer></script>
</body>
</html>
